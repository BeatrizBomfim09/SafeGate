<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeGate – Cadastro de turma</title>
  <link rel="stylesheet" href="./cadastrar-turma.css" />
</head>
<body>

  <div class="bg" style="background-image: url(assets/imagens/imagem_vinho.png);"></div>

  <div class="wrapper">
    <div class="card">

      <div class="logo">
        <img src="assets/imagens/logo.png" alt="SafeGate Logo" />
        <br>
        <h3>Cadastrar turma</h3>
      </div>

      <form class="form" onsubmit="return false;">
        <input
          type="text"
          class="input"
          placeholder="Nome da turma"
        />
        <input
          type="text"
          class="input"
          placeholder="Turno"
        />
        <button type="submit" class="btn">Cadastrar</button>
      </form>

    </div>
  </div>

</body>
</html>
