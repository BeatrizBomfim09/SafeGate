<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeGate – Login</title>
  <link rel="stylesheet" href="./login.css" />
</head>
<body>

  
  <div class="bg" style="background-image: url(assets/imagens/imagem_vinho.png);"></div>

  <div class="wrapper">
    <div class="card">

    
      <div class="logo">
        <img src="assets/imagens/logo.png" alt="SafeGate Logo" />
      </div>

      <form class="form" onsubmit="return false;">
        <input
          type="text"
          class="input"
          placeholder="Login"
          autocomplete="username"
        />
        <input
          type="password"
          class="input"
          placeholder="Senha"
          autocomplete="current-password"
        />
        <button type="submit" class="btn">Acessar</button>
        <a href="#" class="forgot">Esqueci minha senha</a>
      </form>

    </div>
  </div>

</body>
</html>
